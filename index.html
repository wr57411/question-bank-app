            function updateSpacingValue(key, val) {
                spacingValues[key] = parseFloat(val) || 0;
            }

            // 加载图片为 dataURL（跨域兼容）
            function loadImageAsDataURL(url) {
                return new Promise((resolve, reject) => {
                    const tryWithCors = () => {
                        const img = new Image();
                        img.crossOrigin = "anonymous";
                        img.onload = () => toDataURL(img, resolve, () => tryWithoutCors());
                        img.onerror = () => tryWithoutCors();
                        img.src = url;
                    };
                    const tryWithoutCors = () => {
                        const img = new Image();
                        img.onload = () => toDataURL(img, resolve, reject);
                        img.onerror = () => reject(new Error("图片加载失败"));
                        img.src = url + (url.includes("?") ? "&" : "?") + "t=" + Date.now();
                    };
                    const toDataURL = (img, ok, fail) => {
                        try {
                            const c = document.createElement("canvas");
                            c.width = img.naturalWidth; c.height = img.naturalHeight;
                            c.getContext("2d").drawImage(img, 0, 0);
                            ok(c.toDataURL("image/jpeg", 0.92));
                        } catch(e) { fail(e); }
                    };
                    tryWithCors();
                });
            }

            async function exportPDF(basketQuestions) {
                const savedBasket = _basketExportQuestions;
                closeExportModal();
                showStatus("正在生成 PDF，请稍候...", "success");

                try {

                // 获取要导出的题目
                let toExport;
                if (basketQuestions || savedBasket) {
                    // 从试题篮导出
                    toExport = basketQuestions || savedBasket;
                } else {
                    const selectedPaperIds = Array.from(document.querySelectorAll('.export-paper-cb:checked')).map(cb => cb.value);
                    if (selectedPaperIds.length > 0) {
                        // 从选中的试卷中获取题目
                        const { data: pqData, error: pqError } = await supabaseClient
                            .from("paper_questions")
                            .select(`
                                question_id,
                                order_num,
                                paper_id,
                                questions (
                                    *,
                                    question_tags ( tags (*) )
                                )
                            `)
                            .in("paper_id", selectedPaperIds)
                            .order("order_num", { ascending: true });

                        if (pqError) throw pqError;
                        toExport = (pqData || []).map(pq => pq.questions).filter(Boolean);
                    } else if (exportScope === 'selected') {
                        toExport = allQuestions.filter(q => selectedQuestions.has(q.id));
                    } else if (activeFilterTags.length > 0) {
                        toExport = allQuestions.filter(q => {
                            const qTagIds = q.question_tags.map(qt => qt.tags.id);
                            return activeFilterTags.some(ft => qTagIds.includes(ft));
                        });
                    } else {
                        toExport = [...allQuestions];
                    }
                }

                if (toExport.length === 0) {
                    showStatus("没有可导出的题目", "error");
                    return;
                }

                // 按排版适用性排序：仅单栏(0) 在前，单双栏均可(1) 在后
                toExport.sort((a, b) => (a.layout_type || 0) - (b.layout_type || 0));

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
                const pageW = 210, pageH = 297, margin = 15, maxW = pageW - margin * 2;

                // 预加载所有图片
                showStatus("正在加载图片...", "success");
                const imgCache = {};
                for (const q of toExport) {
                    if (q.question_image_url && !imgCache[q.question_image_url]) {
                        try { imgCache[q.question_image_url] = await loadImageAsDataURL(q.question_image_url); } catch(e) { console.warn("题目图片加载失败:", q.question_image_url, e); }
                    }
                    if (q.answer_image_url && !imgCache[q.answer_image_url]) {
                        try { imgCache[q.answer_image_url] = await loadImageAsDataURL(q.answer_image_url); } catch(e) { console.warn("答案图片加载失败:", q.answer_image_url, e); }
                    }
                }

                function addImage(doc, dataUrl, yStart, label, maxH) {
                    return new Promise((resolve) => {
                        if (!dataUrl || dataUrl.length < 50) {
                            resolve(yStart + 10);
                            return;
                        }
                        const img = new Image();
                        let done = false;
                        const finish = (fn) => { if (!done) { done = true; fn(); } };
                        img.onload = function() {
                            finish(() => {
                                const availH = maxH || (pageH - margin * 2 - yStart);
                                const ratio = Math.min(maxW / img.width, availH / img.height, 1);
                                const w = img.width * ratio;
                                const h = img.height * ratio;
                                if (yStart + h > pageH - margin) { doc.addPage(); yStart = margin; }
                                const x = (pageW - w) / 2;
                                doc.addImage(dataUrl, "JPEG", x, yStart, w, h);
                                resolve(yStart + h + 4);
                            });
                        };
                        img.onerror = function() {
                            finish(() => { resolve(yStart + 10); });
                        };
                        setTimeout(() => {
                            finish(() => { resolve(yStart + 10); });
                        }, 5000);
                        img.src = dataUrl;
                    });
                }

                // 双栏模式的图片添加函数
                function addImageDouble(doc, dataUrl, yStart, colW, maxH, margin, label, xStart) {
                    return new Promise((resolve) => {
                        if (!dataUrl || dataUrl.length < 50) {
                            resolve(yStart + 10);
                            return;
                        }
                        const img = new Image();
                        let done = false;
                        const finish = (fn) => { if (!done) { done = true; fn(); } };
                        img.onload = function() {
                            finish(() => {
                                const imgMaxH = maxH - yStart;
                                const ratio = Math.min(colW / img.width, imgMaxH / img.height, 1);
                                const w = img.width * ratio;
                                const h = img.height * ratio;
                                if (yStart + h > maxH) { resolve(yStart + 10); return; }
                                doc.addImage(dataUrl, "JPEG", xStart, yStart, w, h);
                                resolve(yStart + h + 3);
                            });
                        };
                        img.onerror = function() {
                            finish(() => { resolve(yStart + 10); });
                        };
                        setTimeout(() => {
                            finish(() => { resolve(yStart + 10); });
                        }, 5000);
                        img.src = dataUrl;
                    });
                }

                // 获取图片尺寸的辅助函数
                function getImageSize(dataUrl) {
                    return new Promise((resolve) => {
                        if (!dataUrl) { resolve({ w: 1, h: 1 }); return; }
                        const img = new Image();
                        img.onload = () => resolve({ w: img.naturalWidth || 1, h: img.naturalHeight || 1 });
                        img.onerror = () => resolve({ w: 1, h: 1 });
                        img.src = dataUrl;
                    });
                }

                // 预计算所有图片尺寸
                showStatus("正在计算排版...", "success");
                const sizeCache = {};
                for (const q of toExport) {
                    for (const url of [q.question_image_url, q.answer_image_url]) {
                        if (url && !sizeCache[url]) {
                            sizeCache[url] = await getImageSize(imgCache[url]);
                        }
                    }
                }

                function calcImgHeight(dataUrl, maxColW) {
                    if (!dataUrl || !sizeCache[dataUrl]) return 0;
                    const { w, h } = sizeCache[dataUrl];
                    return Math.min(maxColW / w, 1) * h;
                }

                function calcImgSize(dataUrl, maxColW, maxH) {
                    if (!dataUrl || !sizeCache[dataUrl]) return { w: 0, h: 0 };
                    const { w, h } = sizeCache[dataUrl];
                    const ratio = Math.min(maxColW / w, (maxH || 9999) / h, 1);
                    return { w: w * ratio, h: h * ratio };
                }

                // ===== 新规则：按布局类型分批，页边距2cm =====
                const M = 20; // 2cm 页边距
                const W = pageW - M * 2; // 可用宽度 170mm
                const H = pageH - M * 2; // 可用高度 257mm
                const dblColW = (W - M) / 2; // 双栏宽度 75mm

                // 分批：layout_type 0=仅单栏，1=双栏可
                const singleQs = toExport.filter(q => (q.layout_type || 0) === 0);
                const doubleQs = toExport.filter(q => (q.layout_type || 0) === 1);

                // 题后留空
                const spacingMm = exportSpacing === 'large' ? spacingValues.large * 10 : exportSpacing === 'small' ? spacingValues.small * 10 : 0;
                function addSpacing(doc, y, spcMm) {
                    if (spcMm <= 0) return y;
                    y += 4;
                    doc.setDrawColor(200);
                    doc.setLineDash([3, 3]);
                    doc.line(M, y, pageW - M, y);
                    doc.setLineDash([]);
                    return y + spcMm;
                }

                let currentNum = 0; // 全局题号

                function renderSectionHeader(title) {
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(11);
                    doc.setTextColor(120, 120, 120);
                    doc.text("— " + title + " —", pageW / 2, M + 4, { align: "center" });
                    doc.setTextColor(0, 0, 0);
                    return M + 10;
                }

                // ===== 双栏批处理函数 =====
                async function renderDoubleBatch(items) {
                    if (items.length === 0) return;
                    let col = 0, y = M;

                    for (let i = 0; i < items.length; i++) {
                        const q = items[i];
                        const qImg = imgCache[q.question_image_url];
                        const aImg = imgCache[q.answer_image_url];
                        const qH = calcImgHeight(qImg, dblColW);
                        const aH = aImg ? calcImgHeight(aImg, dblColW) : 0;
                        const totalH = 7 + qH + (aImg ? 5 + 5 + aH : 0) + spacingMm + 4;

                        // 换栏或换页
                        if (y + totalH > H) {
                            if (col === 0) { col = 1; y = M; }
                            else { doc.addPage(); col = 0; y = M; }
                        }

                        currentNum++;
                        const x = M + col * (dblColW + M);
                        doc.setFont("helvetica", "bold");
                        doc.setFontSize(12);
                        doc.text(`#${currentNum}`, x, y);
                        y += 7;

                        if (qImg) {
                            y = await addImageDouble(doc, qImg, y, dblColW, H, M, `DQ${currentNum}`, x);
                        }

                        if (aImg && exportMode === 'merged') {
                            y += 2;
                            doc.setFont("helvetica", "normal");
                            doc.setFontSize(9);
                            doc.text("Answer:", x, y);
                            y += 5;
                            y = await addImageDouble(doc, aImg, y, dblColW, H, M, `DA${currentNum}`, x);
                        }

                        if (aImg && exportMode === 'separate') {
                            doubleAnswers.push({ num: currentNum, aImg: aImg });
                        }

                        y = addSpacing(doc, y, spacingMm) + 2;
                    }
                }

                // ===== 单栏批处理函数 =====
                async function renderSingleBatch(items) {
                    if (items.length === 0) return;

                    for (let i = 0; i < items.length; i++) {
                        if (i > 0) doc.addPage();
                        let y = M;
                        currentNum++;
                        const q = items[i];
                        const qImg = imgCache[q.question_image_url];
                        const aImg = imgCache[q.answer_image_url];
                        const hasAnswer = !!aImg && exportMode === 'merged';

                        doc.setFont("helvetica", "bold");
                        doc.setFontSize(14);
                        doc.text(`#${currentNum}`, M, y);
                        y += 8;

                        // 单栏：等比压缩适配 A4 宽度
                        const availH = H - 18;
                        if (qImg) {
                            y = await addImage(doc, qImg, y, `SQ${currentNum}`, hasAnswer ? availH * 0.6 : availH);
                        }

                        if (hasAnswer) {
                            y += 3;
                            doc.setFont("helvetica", "normal");
                            doc.setFontSize(11);
                            doc.text("Answer:", M, y);
                            y += 5;
                            await addImage(doc, aImg, y, `SA${currentNum}`, availH * 0.4);
                        }

                        if (aImg && exportMode === 'separate') {
                            singleAnswers.push({ num: currentNum, aImg: aImg });
                        }

                        addSpacing(doc, y, spacingMm);
                    }
                }

                // ===== 分开模式的答案存储 =====
                const doubleAnswers = [];
                const singleAnswers = [];

                // ===== 执行导出 =====
                let hasContent = false;

                // 先导出双栏批（单双栏均可）
                if (doubleQs.length > 0) {
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(13);
                    doc.text("— 单双栏均可 —", pageW / 2, M + 2, { align: "center" });
                    let y = M + 12;
                    let col = 0;

                    for (let i = 0; i < doubleQs.length; i++) {
                        const q = doubleQs[i];
                        const qImg = imgCache[q.question_image_url];
                        const aImg = imgCache[q.answer_image_url];
                        const qH = calcImgHeight(qImg, dblColW);
                        const aH = aImg ? calcImgHeight(aImg, dblColW) : 0;
                        const totalH = 7 + qH + (exportMode === 'merged' && aImg ? 5 + 5 + aH : 0) + spacingMm + 4;

                        if (y + totalH > H) {
                            if (col === 0) { col = 1; y = M; }
                            else { doc.addPage(); col = 0; y = M; }
                        }

                        currentNum++;
                        const x = M + col * (dblColW + M);
                        doc.setFont("helvetica", "bold");
                        doc.setFontSize(12);
                        doc.text(`#${currentNum}`, x, y);
                        y += 7;

                        if (qImg) y = await addImageDouble(doc, qImg, y, dblColW, H, M, `DQ${currentNum}`, x);

                        if (aImg && exportMode === 'merged') {
                            y += 2;
                            doc.setFont("helvetica", "normal");
                            doc.setFontSize(9);
                            doc.text("Answer:", x, y);
                            y += 5;
                            y = await addImageDouble(doc, aImg, y, dblColW, H, M, `DA${currentNum}`, x);
                        }

                        if (exportMode === 'separate' && aImg) {
                            doubleAnswers.push({ num: currentNum, aImg: aImg });
                        }

                        y = addSpacing(doc, y, spacingMm) + 2;
                    }
                    hasContent = true;
                }

                // 如果两个批次都有，加分隔线
                if (doubleQs.length > 0 && singleQs.length > 0) {
                    doc.addPage();
                }

                // 再导出单栏批（仅单栏）
                if (singleQs.length > 0) {
                    if (hasContent) {
                        doc.setFont("helvetica", "bold");
                        doc.setFontSize(13);
                        doc.text("— 仅单栏 —", pageW / 2, M + 2, { align: "center" });
                    }

                    for (let i = 0; i < singleQs.length; i++) {
                        if (i > 0 || (hasContent && i === 0)) {
                            // 如果是单栏批的第一题且已有双栏内容，已在上方加了新页
                            if (!(hasContent && i === 0)) doc.addPage();
                        }
                        let y = (hasContent && i === 0) ? M + 12 : M;
                        currentNum++;
                        const q = singleQs[i];
                        const qImg = imgCache[q.question_image_url];
                        const aImg = imgCache[q.answer_image_url];
                        const hasAnswer = !!aImg && exportMode === 'merged';

                        doc.setFont("helvetica", "bold");
                        doc.setFontSize(14);
                        doc.text(`#${currentNum}`, M, y);
                        y += 8;

                        const availH = H - 18;
                        if (qImg) y = await addImage(doc, qImg, y, `SQ${currentNum}`, hasAnswer ? availH * 0.6 : availH);

                        if (hasAnswer) {
                            y += 3;
                            doc.setFont("helvetica", "normal");
                            doc.setFontSize(11);
                            doc.text("Answer:", M, y);
                            y += 5;
                            await addImage(doc, aImg, y, `SA${currentNum}`, availH * 0.4);
                        }

                        if (exportMode === 'separate' && aImg) {
                            singleAnswers.push({ num: currentNum, aImg: aImg });
                        }

                        addSpacing(doc, y, spacingMm);
                    }
                }

                // ===== 分开模式：答案部分 =====
                if (exportMode === 'separate') {
                    doc.addPage();
                    // Answer Key 分隔区
                    doc.setFillColor(245, 245, 245);
                    doc.rect(M, M, W, 40, 'F');
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(16);
                    doc.text("Answer Key", pageW / 2, M + 22, { align: "center" });

                    let aY = M + 48;

                    // 先排双栏答案（如果有的话）
                    if (doubleAnswers.length > 0) {
                        let aCol = 0;
                        for (const ans of doubleAnswers) {
                            const aH = calcImgHeight(ans.aImg, dblColW);
                            if (aY + 6 + aH > H) {
                                if (aCol === 0) { aCol = 1; aY = M; }
                                else { doc.addPage(); aCol = 0; aY = M; }
                            }
                            const x = M + aCol * (dblColW + M);
                            doc.setFont("helvetica", "bold");
                            doc.setFontSize(12);
                            doc.text(`#${ans.num}`, x, aY);
                            aY += 6;
                            aY = await addImageDouble(doc, ans.aImg, aY, dblColW, H, M, `DAN${ans.num}`, x);
                            aY += 4;
                        }
                    }

                    // 再排单栏答案
                    if (singleAnswers.length > 0) {
                        for (let i = 0; i < singleAnswers.length; i++) {
                            if (i > 0 || doubleAnswers.length > 0) doc.addPage();
                            let y = M;
                            const ans = singleAnswers[i];
                            doc.setFont("helvetica", "bold");
                            doc.setFontSize(14);
                            doc.text(`#${ans.num}`, M, y);
                            y += 8;
                            await addImage(doc, ans.aImg, y, `SAN${ans.num}`, H - 10);
                        }
                    }
                }

                // 生成 blob URL
                const pdfBlob = doc.output("blob");
                const pdfUrl = URL.createObjectURL(pdfBlob);

                // 创建可点击的下载链接（不依赖弹窗）
                const link = document.createElement("a");
                link.href = pdfUrl;
                link.download = "questions.pdf";
                document.body.appendChild(link);
                link.click();
                link.remove();

                // 同时在新标签页打开（如果浏览器允许的话）
                try { window.open(pdfUrl, "_blank"); } catch {}

                showStatus("✓ PDF 已生成！如果下载没有开始，<a href='" + pdfUrl + "' download='questions.pdf' style='color:#10B981;font-weight:bold;'>点击这里手动下载</a>", "success");

                } catch (err) {
                    console.error("PDF export error:", err);
                    showStatus("PDF 生成失败: " + err.message, "error");
                }
            }

            // 添加标签
            document
                .getElementById("tag-form")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();

                    const name = document.getElementById("tag-name").value;
                    const color = document.getElementById("tag-color").value;

                    const { error } = await supabaseClient
                        .from("tags")
                        .insert({ name, color });

                    if (!error) {
                        document.getElementById("tag-name").value = "";
                        loadTags();
                        showStatus("标签添加成功", "success");
                    } else {
                        showStatus("添加失败: " + error.message, "error");
                    }
                });

            // 删除标签
            async function deleteTag(tagId) {
                if (!confirm("确定删除这个标签吗？")) return;

                const { error } = await supabaseClient
                    .from("tags")
                    .delete()
                    .eq("id", tagId);

                if (!error) {
                    loadTags();
                }
            }

            // 图片预览和裁剪
            document
                .getElementById("question-image")
                .addEventListener("change", (e) => {
                    if (e.target.files && e.target.files[0]) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            // 直接显示预览
                            const preview = document.getElementById("question-preview");
                            preview.src = ev.target.result;
                            document.getElementById("question-preview-wrap").style.display = "inline-block";
                            document.getElementById("question-preview-label").classList.remove("hidden");
                            
                            // 保存图片数据
                            croppedImages.question = e.target.files[0];
                            originalImages.question = ev.target.result;
                        };
                        reader.readAsDataURL(e.target.files[0]);
                    }
                });

            document
                .getElementById("answer-image")
                .addEventListener("change", (e) => {
                    if (e.target.files && e.target.files[0]) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const preview = document.getElementById("answer-preview");
                            preview.src = ev.target.result;
                            document.getElementById("answer-preview-wrap").style.display = "inline-block";
                            document.getElementById("answer-preview-label").classList.remove("hidden");
                            
                            croppedImages.answer = e.target.files[0];
                            originalImages.answer = ev.target.result;
                        };
                        reader.readAsDataURL(e.target.files[0]);
                    }
                });

            function confirmCrop() {
                if (!cropper) return;
                
                const canvas = cropper.getCroppedCanvas({
                    maxWidth: 2000,
                    maxHeight: 2000,
                    fillColor: "#fff",
                });
                
                canvas.toBlob((blob) => {
                    const previewId = currentCropTarget === "question" ? "question-preview" : "answer-preview";
                    const preview = document.getElementById(previewId);
                    const wrapId = currentCropTarget + "-preview-wrap";
                    const labelId = currentCropTarget + "-preview-label";
                    const label = document.getElementById(labelId);
                    
                    // 显示预览
                    preview.src = canvas.toDataURL();
                    document.getElementById(wrapId).style.display = "inline-block";
                    if (label) {
                        label.classList.remove("hidden");
                    }
                    
                    // 保存裁剪后的图片
                    croppedImages[currentCropTarget] = blob;
                    
                    // 关闭弹窗
                    document.getElementById("crop-modal").classList.remove("active");
                    cropper.destroy();
                    cropper = null;
                }, "image/jpeg", 0.9);
            }

            function cancelCrop() {
                document.getElementById("crop-modal").classList.remove("active");
                if (cropper) {
                    cropper.destroy();
                    cropper = null;
                }
            }

            function rotateCrop(deg) {
                if (cropper) cropper.rotate(deg);
            }

            function removeImage(target) {
                croppedImages[target] = null;
                originalImages[target] = null;
                const wrap = document.getElementById(target + "-preview-wrap");
                const preview = document.getElementById(target + "-preview");
                const label = document.getElementById(target + "-preview-label");
                preview.src = "";
                wrap.style.display = "none";
                if (label) label.classList.add("hidden");
                const fileInput = document.getElementById(target === "question" ? "question-image" : "answer-image");
                fileInput.value = "";
            }

            // 添加题目
            document
                .getElementById("question-form")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();

                    const questionFile = croppedImages.question;
                    const answerFile = croppedImages.answer;
                    const selectedTags = getSelectedTagIds("tag-select");

                    if (!questionFile) {
                        showStatus("请先选择题目图片", "error");
                        return;
                    }

                    // 显示上传中状态
                    const submitBtn = e.target.querySelector('button[type="submit"]');
                    const originalText = submitBtn.textContent;
                    submitBtn.disabled = true;
                    submitBtn.textContent = "上传中...";

                    try {
                        // 上传题目图片
                        const questionPath = `questions/${Date.now()}_question.jpg`;
                        
                        let uploadFile = questionFile;
                        if (!(questionFile instanceof File)) {
                            uploadFile = new File([questionFile], "question.jpg", { type: "image/jpeg" });
                        }
                        
                        const { error: qError } = await supabaseClient.storage
                            .from("images")
                            .upload(questionPath, uploadFile);

                        if (qError) throw qError;

                        const questionUrl = supabaseClient.storage
                            .from("images")
                            .getPublicUrl(questionPath).data.publicUrl;

                        // 上传答案图片（如果有）
                        let answerUrl = null;
                        if (answerFile) {
                            const answerPath = `answers/${Date.now()}_answer.jpg`;
                            
                            let answerUploadFile = answerFile;
                            if (!(answerFile instanceof File)) {
                                answerUploadFile = new File([answerFile], "answer.jpg", { type: "image/jpeg" });
                            }
                            
                            const { error: aError } = await supabaseClient.storage
                                .from("images")
                                .upload(answerPath, answerUploadFile);

                            if (aError) throw aError;
                            answerUrl = supabaseClient.storage
                                .from("images")
                                .getPublicUrl(answerPath).data.publicUrl;
                        }

                        // 获取排版适用性
                        const layoutRadio = document.querySelector('input[name="layout_type"]:checked');
                        const layoutType = layoutRadio ? parseInt(layoutRadio.value) : 0;

                        // 创建题目记录
                        const { data: question, error: insertError } =
                            await supabaseClient
                                .from("questions")
                                .insert({
                                    question_image_url: questionUrl,
                                    answer_image_url: answerUrl,
                                    layout_type: layoutType,
                                })
                                .select()
                                .single();

                        if (insertError) throw insertError;

                        // 关联标签
                        if (selectedTags.length > 0) {
                            const tagRelations = selectedTags.map((tagId) => ({
                                question_id: question.id,
                                tag_id: tagId,
                            }));

                            await supabaseClient
                                .from("question_tags")
                                .insert(tagRelations);
                        }

                        // 重置表单
                        document.getElementById("question-form").reset();
                        document.getElementById("question-preview-wrap").style.display = "none";
                        document.getElementById("answer-preview-wrap").style.display = "none";
                        document.getElementById("question-preview-label").classList.add("hidden");
                        document.getElementById("answer-preview-label").classList.add("hidden");
                        // 清除标签选中状态
                        document.querySelectorAll("#tag-select .tag-block.selected").forEach(el => toggleTagBlock(el));
                        // 清除排版选中状态
                        document.querySelectorAll('.layout-option').forEach(l => { l.style.borderColor = '#e5e7eb'; l.style.background = '#fff'; });
                        croppedImages = { question: null, answer: null };

                        // 恢复按钮
                        submitBtn.disabled = false;
                        submitBtn.textContent = originalText;

                        // 刷新题目列表
                        await loadQuestions();
                        
                        showStatus("✓ 题目添加成功！已更新到列表", "success");
                        
                        // 滚动到题目列表
                        setTimeout(() => {
                            document.getElementById("questions-list").scrollIntoView({ 
                                behavior: 'smooth', 
                                block: 'start' 
                            });
                        }, 500);
                    } catch (error) {
                        // 恢复按钮
                        submitBtn.disabled = false;
                        submitBtn.textContent = originalText;
                        let msg = "添加失败: " + (error.message || error);
                        if (error.message && error.message.includes("row-level security")) {
                            msg = "上传失败：Storage bucket 的 RLS 策略未配置。请在 Supabase Dashboard → Storage → images bucket → Policies 中添加允许匿名上传的策略。";
                        }
                        showStatus(msg, "error");
                    }
                });

            // 加载题目
            async function loadQuestions() {
                const { data, error } = await supabaseClient
                    .from("questions")
                    .select(
                        `
                    *,
                    question_tags (
                        tags (*)
                    )
                `,
                    )
                    .order("created_at", { ascending: false });

                if (!error && data) {
                    allQuestions = data;
                    renderQuestions();
                }
            }

            // 渲染筛选标签栏
            function renderFilterTags() {
                const container = document.getElementById("filter-tags");
                container.innerHTML = allTags.map(tag => {
                    const isActive = activeFilterTags.includes(tag.id);
                    const style = isActive
                        ? `background:${tag.color};color:white;border-color:${tag.color}`
                        : `background:white;color:${tag.color};border-color:${tag.color}40`;
                    return `<span class="filter-tag ${isActive ? 'active' : ''}" style="${style}" onclick="toggleFilterTag('${tag.id}')">${tag.name}</span>`;
                }).join("");
            }

            function toggleFilterTag(tagId) {
                const idx = activeFilterTags.indexOf(tagId);
                if (idx >= 0) activeFilterTags.splice(idx, 1);
                else activeFilterTags.push(tagId);
                renderFilterTags();
                renderQuestions();
            }

            // 勾选题目
            function toggleQuestionSelect(qId, el) {
                if (selectedQuestions.has(qId)) {
                    selectedQuestions.delete(qId);
                    el.classList.remove('checked');
                    el.textContent = '';
                    el.closest('.question-card').classList.remove('selected');
                } else {
                    selectedQuestions.add(qId);
                    el.classList.add('checked');
                    el.textContent = '✓';
                    el.closest('.question-card').classList.add('selected');
                }
                updateSelectedCount();
            }

            function updateSelectedCount() {
                const el = document.getElementById("selected-count");
                if (selectedQuestions.size > 0) {
                    el.style.display = "inline";
                    document.getElementById("selected-num").textContent = selectedQuestions.size;
                } else {
                    el.style.display = "none";
                }
            }

            // 导出：有勾选则导出勾选的，否则导出筛选结果或全部
            function exportSelectedOrAll() {
                if (selectedQuestions.size > 0) {
                    showExportModal('selected');
                } else {
                    showExportModal('all');
                }
            }

            // 渲染题目列表
            function renderQuestions() {
                const container = document.getElementById("questions-list");

                // 筛选
                let filtered = allQuestions;
                if (activeFilterTags.length > 0) {
                    filtered = allQuestions.filter(q => {
                        const qTagIds = q.question_tags.map(qt => qt.tags.id);
                        return activeFilterTags.some(ft => qTagIds.includes(ft));
                    });
                }

                // 更新计数
                document.getElementById("question-count").textContent =
                    activeFilterTags.length > 0 ? `(筛选: ${filtered.length}/${allQuestions.length})` : `(${allQuestions.length})`;
                updateSelectedCount();
                container.innerHTML = filtered
                    .map((q) => {
                        const tags = q.question_tags.map((qt) => qt.tags);
                        const tagOptions = allTags
                            .filter(t => !tags.some(qt => qt.id === t.id))
                            .map(t => `<option value="${t.id}">${t.name}</option>`)
                            .join("");
                        const isChecked = selectedQuestions.has(q.id);
                        const inBasket = questionBasket.has(q.id);
                        return `
                    <div class="question-card ${isChecked ? 'selected' : ''}" data-id="${q.id}">
                        <button class="q-checkbox ${isChecked ? 'checked' : ''}" onclick="event.stopPropagation(); toggleQuestionSelect('${q.id}', this)">${isChecked ? '✓' : ''}</button>
                        <img src="${q.question_image_url}" alt="题目" onclick="showQuestionDetail('${q.id}')">
                        <div class="info" onclick="showQuestionDetail('${q.id}')">
                            <div class="tags">
                                ${tags.map((t) => `<span class="tag" style="background: ${t.color}20">${t.name}</span>`).join("")}
                                <span class="tag-add-btn" onclick="event.stopPropagation(); toggleInlineTagAdd('${q.id}')">+</span>
                            </div>
                            <div id="inline-add-${q.id}" class="inline-tag-add hidden">
                                ${tagOptions ? `<select id="inline-tag-select-${q.id}">${tagOptions}</select><button onclick="event.stopPropagation(); addTagToQuestion('${q.id}')">添加</button>` : '<span style="color:#888;font-size:13px;">没有可添加的标签</span>'}
                                <button onclick="event.stopPropagation(); openNewTagModalFromCard('${q.id}')">新建标签</button>
                                <button class="secondary" onclick="event.stopPropagation(); toggleInlineTagAdd('${q.id}')">取消</button>
                            </div>
                        </div>
                    </div>
                `;
                    })
                    .join("");
            }

            // 切换行内加标签界面
            function toggleInlineTagAdd(questionId) {
                const el = document.getElementById(`inline-add-${questionId}`);
                el.classList.toggle("hidden");
            }

            // 给题目添加标签
            async function addTagToQuestion(questionId) {
                const select = document.getElementById(`inline-tag-select-${questionId}`);
                const tagId = select.value;
                if (!tagId) return;

                const { error } = await supabaseClient
                    .from("question_tags")
                    .insert({ question_id: questionId, tag_id: tagId });

                if (!error) {
                    loadQuestions();
                } else {
                    alert("添加标签失败: " + error.message);
                }
            }

            // 获取当前筛选后的题目列表
            function getFilteredQuestions() {
                if (activeFilterTags.length === 0) return [...allQuestions];
                return allQuestions.filter(q => {
                    const qTagIds = q.question_tags.map(qt => qt.tags.id);
                    return activeFilterTags.some(ft => qTagIds.includes(ft));
                });
            }

            let detailIndex = -1; // 当前在筛选列表中的索引
            let filteredList = [];

            // 更新详情弹窗内容
            function renderDetailContent(question) {
                document.getElementById("modal-question-image").innerHTML =
                    `<h3>题目</h3><img src="${question.question_image_url}" style="max-width: 100%;">`;

                document.getElementById("modal-answer-image").innerHTML =
                    question.answer_image_url
                        ? `<h3>答案</h3><img src="${question.answer_image_url}" style="max-width: 100%;">`
                        : "<p>无答案图片</p>";

                const tags = question.question_tags.map((qt) => qt.tags);
                document.getElementById("modal-tags").innerHTML =
                    `<h3>标签</h3><div class="tag-container">${tags.map((t) => `<span class="tag" style="background: ${t.color}20">${t.name}</span>`).join("")}</div>`;

                // 更新导航信息
                document.getElementById("detail-nav-info").textContent = `${detailIndex + 1} / ${filteredList.length}`;
                document.getElementById("btn-prev").disabled = detailIndex <= 0;
                document.getElementById("btn-next").disabled = detailIndex >= filteredList.length - 1;
                document.getElementById("btn-prev").style.opacity = detailIndex <= 0 ? 0.4 : 1;
                document.getElementById("btn-next").style.opacity = detailIndex >= filteredList.length - 1 ? 0.4 : 1;

                // 更新试题篮按钮
                updateDetailBasketBtn(question.id);
            }

            function updateDetailBasketBtn(qId) {
                const btn = document.getElementById("detail-basket-btn");
                if (questionBasket.has(qId)) {
                    btn.textContent = '✓';
                    btn.style.background = '#3B82F6';
                    btn.style.color = '#fff';
                } else {
                    btn.textContent = '🧺';
                    btn.style.background = 'rgba(255,255,255,0.9)';
                    btn.style.color = '#333';
                }
            }

            function toggleBasketInDetail() {
                if (!currentQuestionId) return;
                toggleBasketQuestion(currentQuestionId, null);
                updateDetailBasketBtn(currentQuestionId);
                renderQuestions(); // 刷新列表中按钮状态
            }

            function navigateDetail(dir) {
                const newIdx = detailIndex + dir;
                if (newIdx < 0 || newIdx >= filteredList.length) return;
                detailIndex = newIdx;
                const q = filteredList[detailIndex];
                currentQuestionId = q.id;
                renderDetailContent(q);
            }

            // 显示题目详情
            function showQuestionDetail(questionId) {
                currentQuestionId = questionId;
                filteredList = getFilteredQuestions();
                detailIndex = filteredList.findIndex(q => q.id === questionId);
                if (detailIndex < 0) detailIndex = 0;

                const question = filteredList[detailIndex];
                if (question) {
                    renderDetailContent(question);
                    document.getElementById("question-modal").classList.add("active");
                }
            }

            // 触摸滑动支持
            (function() {
                let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
                const modal = document.getElementById("question-modal");
                const content = document.getElementById("question-detail-content");

                modal.addEventListener('touchstart', function(e) {
                    if (e.touches.length !== 1) return;
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                    touchStartTime = Date.now();
                }, { passive: true });

                modal.addEventListener('touchend', function(e) {
                    if (!modal.classList.contains('active')) return;
                    const dx = e.changedTouches[0].clientX - touchStartX;
                    const dy = e.changedTouches[0].clientY - touchStartY;
                    const dt = Date.now() - touchStartTime;
                    // 水平滑动 > 60px 且 < 500ms 且纵向偏移不大
                    if (Math.abs(dx) > 60 && dt < 500 && Math.abs(dy) < 100) {
                        if (dx < 0) navigateDetail(1);  // 左滑 → 下一题
                        else navigateDetail(-1);         // 右滑 → 上一题
                    }
                }, { passive: true });

                // 键盘左右箭头导航
                document.addEventListener('keydown', function(e) {
                    if (!modal.classList.contains('active')) return;
                    if (e.key === 'ArrowLeft') { e.preventDefault(); navigateDetail(-1); }
                    else if (e.key === 'ArrowRight') { e.preventDefault(); navigateDetail(1); }
                    else if (e.key === 'Escape') closeModal();
                });
            })();

            // 删除题目
            async function deleteQuestion() {
                if (!currentQuestionId || !confirm("确定删除这道题目吗？"))
                    return;

                const { error } = await supabaseClient
                    .from("questions")
                    .delete()
                    .eq("id", currentQuestionId);

                if (!error) {
                    closeModal();
                    loadQuestions();
                }
            }

            // 关闭弹窗
            function closeModal() {
                document
                    .getElementById("question-modal")
                    .classList.remove("active");
                currentQuestionId = null;
            }

            // 创建试卷
            document
                .getElementById("paper-form")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();

                    const name = document.getElementById("paper-name").value;
                    const selectedTags = getSelectedTagIds("paper-tag-select");

                    try {
                        // 创建试卷
                        const { data: paper, error: paperError } =
                            await supabaseClient
                                .from("papers")
                                .insert({ name })
                                .select()
                                .single();

                        if (paperError) throw paperError;

                        // 获取包含选定标签的题目
                        if (selectedTags.length > 0) {
                            const { data: questionTags, error: qtError } =
                                await supabaseClient
                                    .from("question_tags")
                                    .select("question_id")
                                    .in("tag_id", selectedTags);

                            if (qtError) throw qtError;

                            // 去重
                            const questionIds = [
                                ...new Set(
                                    questionTags.map((qt) => qt.question_id),
                                ),
                            ];

                            // 添加到试卷
                            const paperQuestions = questionIds.map(
                                (qId, index) => ({
                                    paper_id: paper.id,
                                    question_id: qId,
                                    order_num: index + 1,
                                }),
                            );

                            if (paperQuestions.length > 0) {
                                await supabaseClient
                                    .from("paper_questions")
                                    .insert(paperQuestions);
                            }
                        }

                        document.getElementById("paper-form").reset();
                        document.querySelectorAll("#paper-tag-select .tag-block.selected").forEach(el => toggleTagBlock(el));
                        loadPapers();
                        showStatus("试卷创建成功", "success");
                    } catch (error) {
                        showStatus("创建失败: " + error.message, "error");
                    }
                });

            // 加载试卷
            async function loadPapers() {
                const { data, error } = await supabaseClient
                    .from("papers")
                    .select(
                        `
                    *,
                    paper_questions (count)
                `,
                    )
                    .order("created_at", { ascending: false });

                if (!error && data) {
                    const container = document.getElementById("papers-list");
                    container.innerHTML = data
                        .map(
                            (p) => `
                    <div class="card" style="margin-bottom: 10px;">
                        <h3>${p.name}</h3>
                        <p>题目数量: ${p.paper_questions[0]?.count || 0}</p>
                        <p>创建时间: ${new Date(p.created_at).toLocaleString()}</p>
                        <button onclick="downloadPaperPDF('${p.id}', '${p.name}')">下载 PDF</button>
                        <button class="danger" onclick="deletePaper('${p.id}')">删除</button>
                    </div>
                `,
                        )
                        .join("");
                }
            }

            // 下载试卷 PDF
            function downloadPaperPDF(paperId, paperName) {
                alert(
                    `请使用 Python 脚本生成 PDF:\n\ngenerate_pdf("${paperId}", "${paperName}.pdf")`,
                );
            }

            // 删除试卷
            async function deletePaper(paperId) {
                if (!confirm("确定删除这份试卷吗？")) return;

                const { error } = await supabaseClient
                    .from("papers")
                    .delete()
                    .eq("id", paperId);

                if (!error) {
                    loadPapers();
                }
            }

            // 显示状态消息
            function showStatus(message, type) {
                const container = document.getElementById("status-message");
                const closeBtn = type === "error" ? ' <span style="cursor:pointer;float:right;font-weight:bold" onclick="this.parentElement.parentElement.innerHTML=\'\'">&times;</span>' : '';
                container.innerHTML = `<div class="status ${type}">${message}${closeBtn}</div>`;
                container.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                if (type === 'success') {
                    setTimeout(() => {
                        container.innerHTML = "";
                    }, 15000);
                }
                // error 消息不自动消失
            }
        </script>
        <!-- 试题篮悬浮按钮 -->
        <button id="basket-fab" class="basket-fab" onclick="openBasketModal()">
            🧺
            <span class="badge" id="basket-badge" style="display:none">0</span>
        </button>

        <!-- 试题篮弹窗 -->
        <div id="basket-modal" class="modal" onclick="if(event.target===this)closeBasketModal()">
            <div class="modal-content export-modal-content">
                <h3>🧺 试题篮 <span id="basket-modal-count" style="font-size:13px;color:#888;font-weight:400"></span></h3>
                <div id="basket-items" style="max-height:50vh;overflow-y:auto;"></div>
                <div class="btn-row" style="margin-top:16px;">
                    <button class="secondary" onclick="closeBasketModal()">取消</button>
                    <button onclick="exportFromBasket()" style="background:#10B981;color:white;border:none;">确认导出</button>
                </div>
            </div>
        </div>

    </body>
</html>
